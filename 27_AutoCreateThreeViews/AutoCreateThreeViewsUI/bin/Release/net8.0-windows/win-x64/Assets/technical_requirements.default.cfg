KEY_WORD TECHNICAL_NOTES_START
加工件通用技术要求
+表面粗糙度
+未注公差
+未注长度尺寸上、下偏差为0.001
+零件去除氧化皮。
+零件加工表面上，不应有划痕、擦伤等损伤零件表面的缺陷。
+去除毛刺飞边。
+经调质处理，HRC50～55。
+零件进行高频淬火，350～370℃回火，HRC40～45。
+渗碳深度0.3mm。
+进行高温时效处理。
+未注形状公差应符合GB1184-80的要求。
+未注长度尺寸允许偏差±0.5mm。
+未注圆角半径R5。
+未注倒角均为2×45°。
+锐角倒钝。
+人工时效处理。
装配通用技术要求
+必须按照设计、工艺要求及本规定和有关标准进行装配。
+所有零部件（包括外购、外协件）必须具有检验合格证方能进行装配。
+零件在装配前必须清理和清洗干净，不得有毛刺、飞边、氧化皮、锈蚀、切屑、砂粒、灰尘和油污等，并应符合相应清洁度要求。
+装配过程中零件不得磕碰、划伤和锈蚀。
+油漆未干的零件不得进行装配。
+相对运动的零件，装配时接触面间应加润滑油脂。
+各零、部件装配后相对位置应准确。
铸件通用技术要求
+铸件表面上不允许有冷隔、裂纹、缩孔和穿透性缺陷及严重的残缺类缺陷（如欠铸、机械损伤等）。
+铸件应清理干净，不得有毛刺、飞边，非加工表明上的浇冒口应清理与铸件表面齐平。
+铸件非加工表面上的铸字和标志应清晰可辨，位置和字体应符合图样要求。
+铸件非加工表面的粗糙度，砂型铸造R，不大于50μm。
+铸件应清除浇冒口、飞刺等。非加工表面上的浇冒口残留量要铲平、磨光，达到表面质量要求。
+铸件上的型砂、芯砂和芯骨应清除干净。
+铸件有倾斜的部位、其尺寸公差带应沿倾斜面对称配置。
+铸件上的型砂、芯砂、芯骨、多肉、粘沙等应铲磨平整，清理干净。
+对错型、凸台铸偏等应予以修正，达到圆滑过渡，以保证外观质量。
+铸件非加工表面的皱褶，深度小于2mm，间距应大于100mm。
+机器产品铸件的非加工表面均需喷丸处理或滚筒处理，达到清洁度Sa2 1/2级的要求。
+铸件必须进行水韧处理。
+铸件表面应平整，浇口、毛刺、粘砂等应清除干净。
+铸件不允许存在有损于使用的冷隔、裂纹、孔洞等铸造缺陷。
+铸件公差带对称于毛坯铸件基本尺寸配置。
塑料件通用技术要求
+表面应光洁无损、色泽均匀，无明显凹痕、飞边、银丝、熔接痕等缺陷。
+机械强度应符合GB3883.1-2000第20条所规定的要求。
+零件需消除残余应力及稳定尺寸。
+零件应有足够的耐应力开裂性，用四氯化碳溶液浸泡1分钟，无开裂。
+未注圆角R0.5-1.5，未注壁厚为2.0-3.0。
+未注脱模、未注公差尺寸的允许偏差按GB/T14486-93-MT5。
+斜度0.5-1.50。
+未注加强筋厚1，高1。
+零件外表面皮纹处理。
+未注注塑圆角R0.5。
+材料为阻燃ABS+PC，材料中添加TINUVIN成分，使其具备抗紫外线、防氧化、防退色等功能。
未注公差
+一般公差按GB/T 1804-m。
+未注形位公差按GB/T1184-k。
未注参数
+未注圆角 R0.5。
+未注倒角 C1。
+未注壁厚 1.5。
+未注弯曲均为 R0.5。
+拔模斜度 1:200。
塑料件技术要求
+热塑性塑料注塑按企业技术条件规定。
+热固性塑料压制按企业技术条件规定。
冲压件技术要求
+冲压件按企业技术条件规定。
表面质量技术要求
+表面应光洁无任何压制痕迹。
+外侧面为光亮面。
+内侧面为光亮面。
+去锐边。
+端面不允许有毛刺。
+内六角的棱角清晰。
+锐角倒钝。
+两端不允许有毛刺及失圆。
热处理技术要求
+HRC45～55 按企业技术条件规定。
+HRC45～55 深度按企业技术条件规定。
+热处理软氮化 HV329-377按企业技术条件规定。
表面处理技术要求
+表面处理按企业技术条件规定。
+Ep.Zn12.c2C 按企业技术条件规定。
+Ep.Cr12hd 按企业技术条件规定。
触头技术要求
+触头按GB/T5587的要求制造。
弹簧技术要求
+发黑。
+旋向：右旋。
+有效圈数：n=
+总圈数：n1=
+热处理：回火按
+线性展开长度 L=
+弹簧制造验收按
+弹簧按 GB/T1973.1 二级精度制造。
+弹簧的制造、试验和验收按企业技术条件规定二级精度。
+双金属元件的稳定处理按企业技术条件规定。
+当原边通以 50Hz50mA 匝时副边空载输出。
+序号 1 与序号 2 铆合，在铆合处涂环氧漆 H31-2。
+序号 1 与序号 2 配合处应灵活可靠，无卡死现象。
+焊孔边缘加助焊剂，其余部分涂阻焊剂。
+落料后两头按图示要求点焊成型。
+软导线两头在点焊机上压扁。
铆焊技术要求
+铆合按企业技术条件规定。
+焊接按企业技术条件规定。
其他技术要求
+触头超程:
+触头终压力:
+脱扣力:
+软联结焊接按企业技术条件规定。
+线圈绕制按企业技术条件规定。
+机构活动部分允许加润滑油。
+在跳扣与锁扣之间涂润滑油。
+基座与盖配合偏差不超过。
+产品应符合企业技术条件。
+元件装配好后高度不大于。
+点焊处应承受 100N 顺向拉力 1 分钟不脱落。
+铆接处涂 H31-3 环氧脂绝缘清漆。
KEY_WORD TECHNICAL_NOTES_END
